name: deno

on:
  push:
    branches: [main]
  pull_request:

jobs:
  deno:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: fmt
        run: deno fmt --check
      - name: lint
        run: deno lint
      - name: test
        run: deno test --allow-read
