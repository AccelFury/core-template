name: sim-verilator

on:
  push:
    branches: [main]
  pull_request:

jobs:
  sim:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: setup rust
        uses: dtolnay/rust-toolchain@stable
      - name: install verilator
        run: sudo apt-get update && sudo apt-get install -y verilator
      - name: generate vectors
        run: cargo xtask vectors
      - name: simulate systemverilog rtl
        run: cargo xtask sim-verilator
      - name: simulate verilog-2001 rtl
        run: cargo xtask sim-verilator --language verilog-2001
      - name: simulate verilog-2005 rtl
        run: cargo xtask sim-verilator --language verilog-2005
